{{define "modals/outModal"}}
<a-modal id="out-modal" v-model="outModal.visible" :title="outModal.title" @ok="outModal.ok"
    :confirm-loading="outModal.confirmLoading" :closable="true" :mask-closable="false"
    :ok-button-props="{ props: { disabled: !outModal.isValid } }" :style="{ overflow: 'hidden' }"
    :ok-text="outModal.okText" cancel-text='{{ i18n "close" }}' :class="themeSwitcher.currentTheme">
    <a-alert v-if="outModal.generalValidationErrors.length > 0" type="error" show-icon
        :message="outModal.generalValidationErrors.join(' ')" :style="{ marginBottom: '12px' }"></a-alert>
    {{template "form/outbound" .}}
</a-modal>
<script>
    const outModal = {
        title: '',
        visible: false,
        confirmLoading: false,
        okText: '{{ i18n "sure" }}',
        isEdit: false,
        confirm: null,
        outbound: new Outbound(),
        jsonMode: false,
        link: '',
        cm: null,
        duplicateTag: false,
        isValid: true,
        jsonValid: true,
        fieldValidationErrors: {},
        generalValidationErrors: [],
        activeKey: '1',
        tags: [],
        ok() {
            outModal.check();
            if (!outModal.isValid) return;
            ObjectUtil.execute(outModal.confirm, outModal.outbound.toJson());
        },
        show({
            title = '',
            okText = '{{ i18n "sure" }}',
            outbound,
            confirm = (outbound) => {},
            isEdit = false,
            tags = []
        }) {
            this.title = title;
            this.okText = okText;
            this.confirm = confirm;
            this.jsonMode = false;
            this.link = '';
            this.jsonValid = true;
            this.activeKey = '1';
            this.visible = true;
            this.outbound = isEdit ? Outbound.fromJson(outbound) : new Outbound();
            this.isEdit = isEdit;
            this.tags = tags;
            this.check()
        },
        close() {
            outModal.visible = false;
            outModal.loading(false);
        },
        loading(loading = true) {
            outModal.confirmLoading = loading;
        },
        check() {
            const validationIssues = outModal.outbound.validationIssues();
            this.fieldValidationErrors = validationIssues.reduce((errors, issue) => {
                if (issue.field !== 'legacy') errors[issue.field] = issue.message;
                return errors;
            }, {});
            this.generalValidationErrors = validationIssues
                .filter(issue => issue.field === 'legacy')
                .map(issue => issue.message);
            if (!this.jsonValid) {
                this.generalValidationErrors.push('Outbound JSON must be an object with a valid tag, protocol, and settings object.');
            }

            const validTag = typeof outModal.outbound.tag === 'string'
                && outModal.outbound.tag.trim() !== '';
            const validProtocol = typeof outModal.outbound.protocol === 'string'
                && Object.values(Protocols).includes(outModal.outbound.protocol);
            if (!validTag || !validProtocol || outModal.tags.includes(outModal.outbound.tag)) {
                this.duplicateTag = true;
            } else {
                this.duplicateTag = false;
            }
            this.isValid = !this.duplicateTag && this.jsonValid && validationIssues.length === 0;
        },
        fieldError(field) {
            return this.fieldValidationErrors[field] || '';
        },
        toggleJson(jsonTab) {
            textAreaObj = document.getElementById('outboundJson');
            if (jsonTab) {
                if (this.cm != null) {
                    this.cm.toTextArea();
                    this.cm = null;
                }
                textAreaObj.value = JSON.stringify(this.outbound.toJson(), null, 2);
                this.cm = CodeMirror.fromTextArea(textAreaObj, app.cmOptions);
                this.cm.on('change', editor => {
                    value = editor.getValue();
                    const parsed = this.parseOutboundJson(value);
                    if (parsed) {
                        this.jsonValid = true;
                        this.outbound = Outbound.fromJson(parsed);
                    } else {
                        this.jsonValid = false;
                    }
                    this.check();
                });
                this.activeKey = '2';
            } else {
                if (this.cm != null) {
                    this.cm.toTextArea();
                    this.cm = null;
                }
                this.jsonValid = true;
                this.check();
                this.activeKey = '1';
            }
        },
        parseOutboundJson(str) {
            try {
                const parsed = JSON.parse(str);
                if (parsed === null || typeof parsed !== 'object' || Array.isArray(parsed)) return null;
                if (typeof parsed.tag !== 'string' || typeof parsed.protocol !== 'string') return null;
                if (!Object.values(Protocols).includes(parsed.protocol)) return null;
                if (parsed.settings === null || typeof parsed.settings !== 'object' || Array.isArray(parsed.settings)) {
                    return null;
                }
                return parsed;
            } catch (e) {
                return null;
            }
        },
    };

    new Vue({
        delimiters: ['[[', ']]'],
        el: '#out-modal',
        data: {
            outModal: outModal,
            get outbound() {
                return outModal.outbound;
            },
        },
        methods: {
            streamNetworkChange() {
                if (this.outModal.outbound.protocol == Protocols.VLESS && !outModal.outbound
                .canEnableTlsFlow()) {
                    delete this.outModal.outbound.settings.flow;
                }
            },
            canEnableTls() {
                return this.outModal.outbound.canEnableTls();
            },
            convertLink() {
                newOutbound = Outbound.fromLink(outModal.link);
                if (newOutbound) {
                    this.outModal.outbound = newOutbound;
                    this.outModal.toggleJson(true);
                    this.outModal.check();
                    this.$message.success('Link imported successfully...');
                    outModal.link = '';
                } else {
                    this.$message.error('Wrong Link!');
                    outModal.link = '';
                }
            },
        },
    });
</script>
{{end}}
